processes:
  - domain: 销售
    business_process: 门店销售
    grain: 订单明细
    fact_type: transaction
    dimensions:
      - 客户
      - 商品
      - 店铺
      - 日期
    measures:
      - name: quantity
        source_field: sale_qty
        type: BIGINT
        description: 销售数量
        aggregation: SUM
      - name: amount
        source_field: sale_amount
        type: DECIMAL(18,2)
        description: 销售金额
        aggregation: SUM
    source_tables:
      - ods_sales_order_detail
